<p

</p>

<!-- ================= FILTERS ================= -->

<button class="active-filter" data-filter="all"

<button data-filter="Backend">Backend</button>
<button data-filter="Real Estate">Real Estate</button>
<button data-filter="Business">Business</button>
<button data-filter="Sales">Sales</button>
<button data-filter="Frontend">Frontend</button>

</section>

<div class="container projects-grid" id="projects-container"></div>
</section>

<!-- ================= FOOTER ================= -->
<footer
data-en="© 2026 Eyesightworks — Alawode Adewale Afeez"
data-fr="© 2026 Eyesightworks — Alawode Adewale Afeez"
data-es="© 2026 Eyesightworks — Alawode Adewale Afeez"
data-ar="© 2026 Eyesightworks — آلاووود أدوالي أفيس">
© 2026 Eyesightworks — Alawode Adewale Afeez
</footer>

<script>

/* ================= PROJECT DATA ================= */
const projects = [
{
title:"⭐ EyesightWorks Real Estate System",
image:"your-project/backend.png",
tech:"NestJS, Prisma, PostgreSQL, Cloudinary, JWT",
demo:"https://eyesight-realestate.vercel.app",
code:"https://github.com/eyesightworks/pharmacy-auto-realestate-backend",
category:"Backend",
description:{
en:"Full-stack backend system with authentication, cloud media, and scalable architecture.",
fr:"Système backend complet avec authentification et stockage cloud.",
es:"Sistema backend completo con autenticación y almacenamiento en la nube.",
ar:"نظام خلفي متكامل مع المصادقة والتخزين السحابي."
}
},

{
title:"Real Estate Dashboard",
image:"your-project/real-estate-dashboard.png",
tech:"React, Node.js",
demo:"https://eyesightworks.github.io/real-estate/",
code:"https://github.com/eyesightworks/real-estate",
category:"Real Estate",
description:{
en:"Dashboard for managing and filtering real estate listings.",
fr:"Tableau de bord pour gérer les annonces immobilières.",
es:"Panel para gestionar listados inmobiliarios.",
ar:"لوحة إدارة للعقارات."
}
},

{
title:"Property Booking System",
image:"your-project/real-estate-booking.png",
tech:"React, Stripe API",
demo:"https://eyesightworks.github.io/property-finder/",
code:"https://github.com/eyesightworks/property-finder",
category:"Real Estate",
description:{
en:"Property booking system with payment integration.",
fr:"Système de réservation avec paiement.",
es:"Sistema de reservas con pagos.",
ar:"نظام حجز مع الدفع الإلكتروني."
}
}
];

/* ================= RENDER ================= */
const container = document.getElementById("projects-container");
const langSelect = document.querySelector("[data-lang-select]");

function getLang(){
  return langSelect ? langSelect.value : "en";
}

function render(filter="all"){
const lang = getLang();
container.innerHTML = "";

projects.forEach(p => {
if(filter === "all" || p.category === filter){

container.innerHTML += `
<div class="project-card">

<img src="${p.image}" alt="${p.title}">

<h3>${p.title}</h3>

<p><strong data-en="Tech:" data-fr="Tech :" data-es="Tecnología:" data-ar="التقنيات:">Tech:</strong> ${p.tech}</p>

<p>${p.description[lang]}</p>

<div class="btn-box">
${p.demo ? `<a class="btn" href="${p.demo}" target="_blank"
data-en="Live Demo" data-fr="Démo" data-es="Demo" data-ar="عرض مباشر">
Live Demo</a>` : ""}

${p.code ? `<a class="btn btn-secondary" href="${p.code}" target="_blank"
data-en="View Code" data-fr="Code" data-es="Código" data-ar="الكود">
View Code</a>` : ""}
</div>

</div>`;
}
});
}

render();

/* ================= FILTER ================= */
document.querySelectorAll("#category-filters button").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll("#category-filters button")
.forEach(b=>b.classList.remove("active-filter"));
btn.classList.add("active-filter");
render(btn.dataset.filter);
};
});

/* ================= LANGUAGE SWITCH ================= */
langSelect.addEventListener("change", ()=>{
render();
});

/* ================= HAMBURGER ================= */
const hamburger = document.querySelector("[data-hamburger]");
const navMenu = document.querySelector("[data-nav-menu]");

hamburger.addEventListener("click", ()=>{
navMenu.classList.toggle("show");
});

</script>

</body>
</html>
