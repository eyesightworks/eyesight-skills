<script>
// ================= PROJECT DATA =================
const projects = [

  // ⭐ FEATURED BACKEND FIRST
  {
    title:"⭐ EyesightWorks Real Estate System (Full-Stack)",
    image:"images/real-estate-admin-upload.png",
    tech:"NestJS, Prisma ORM, PostgreSQL, Cloudinary, JWT",
    demo:"https://eyesight-realestate.vercel.app",
    code:"https://github.com/eyesightworks/pharmacy-auto-realestate-backend",
    category:"Backend",
    description:`
Admin Panel: https://frontend-eight-mocha-89.vercel.app

Full-stack system with:
• JWT Authentication & Role-based access
• Cloudinary image upload
• PostgreSQL database (Prisma ORM)
• Properties, Vehicles, Products management

Flow:
Admin Upload → Cloudinary → Backend → Database → Frontend
`
  },

  {
    title:"Real Estate Platform Dashboard",
    image:"your-project/real-estate-dashboard.png",
    tech:"React, Node.js, MySQL",
    demo:"https://eyesightworks.github.io/real-estate/",
    code:"https://github.com/eyesightworks/real-estate",
    category:"Real Estate"
  },

  {
    title:"Property Booking System",
    image:"your-project/real-estate-booking.png",
    tech:"React, Stripe API",
    demo:"https://eyesightworks.github.io/property-finder/",
    code:"https://github.com/eyesightworks/property-finder",
    category:"Real Estate"
  },

  {
    title:"Inventory Management Dashboard",
    image:"your-project/pharmacy-dashboard.png",
    tech:"HTML, CSS, JavaScript",
    demo:"https://eyesightworks.github.io/pharmacy-dashboard/",
    code:"https://github.com/eyesightworks/pharmacy-dashboard",
    category:"Pharmacy"
  },

  {
    title:"Sales Management Platform",
    image:"your-project/automobile-dashboard.png",
    tech:"HTML, CSS, JavaScript",
    demo:"https://eyesightworks.github.io/cars/",
    code:"https://github.com/eyesightworks/cars",
    category:"Automobile"
  },

  {
    title:"Personal Portfolio",
    image:"your-project/portfolio.png",
    tech:"HTML, CSS, JavaScript",
    demo:"https://eyesightworks.github.io/eyesight-skills/",
    code:"https://github.com/eyesightworks/eyesight-skills",
    category:"Portfolio"
  }

];

// ================= RENDER =================
const container = document.getElementById("projects-container");

function render(filter="all"){
  container.innerHTML="";
  projects.forEach(p=>{
    if(filter==="all"||p.category===filter){
      container.innerHTML+=`
      <div class="project-card">
        <img src="${p.image}" alt="${p.title}">
        <h3>${p.title}</h3>
        <p><strong>Tech:</strong> ${p.tech}</p>
        ${p.description ? `<p>${p.description}</p>` : ""}
        <div class="btn-box">
          ${p.demo?`<a class="btn" href="${p.demo}" target="_blank">Live Demo</a>`:""}
          ${p.code?`<a class="btn btn-secondary" href="${p.code}" target="_blank">View Code</a>`:""}
        </div>
      </div>`;
    }
  });
}

render();

// FILTER
document.querySelectorAll("#category-filters button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll("#category-filters button")
      .forEach(b=>b.classList.remove("active-filter"));
    btn.classList.add("active-filter");
    render(btn.dataset.filter);
  };
});

// HAMBURGER (UNCHANGED)
const hamburger = document.querySelector("[data-hamburger]");
const navMenu = document.querySelector("[data-nav-menu]");

if(hamburger && navMenu){
  hamburger.addEventListener("click", ()=>{
    const isOpen = navMenu.classList.toggle("show");
    hamburger.setAttribute("aria-expanded", String(isOpen));
  });
}

</script>

</body>
